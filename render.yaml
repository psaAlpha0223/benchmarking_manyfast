services:
  - type: web
    name: ai-planning-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: MAX_TOKENS
        value: "32000"
      - key: MAX_FILE_SIZE_MB
        value: "200"
      - key: MAX_TOTAL_FILE_SIZE_MB
        value: "1024"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENV
        value: production
      - key: ENABLE_WIREFRAME
        value: "false"
